<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIV_SECURE_PORTAL // SYSTEM_V.2.0</title>
    <style>
        :root {
            --neon-green: #0f0;
            --neon-glow: rgba(0, 255, 0, 0.5);
            --dark-bg: #000;
            --panel-bg: rgba(10, 20, 10, 0.85);
            --alert: #f00;
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            height: 100vh;
        }

        /* MATRIX BACKGROUND */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* CONTAINER BOX */
        .container {
            position: relative;
            max-width: 800px;
            margin: 50px auto;
            border: 2px solid var(--neon-green);
            padding: 30px;
            background: var(--panel-bg);
            box-shadow: 0 0 20px var(--neon-glow), inset 0 0 20px rgba(0,255,0,0.2);
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        /* GLITCH TEXT EFFECT */
        .glitch {
            position: relative;
            color: var(--neon-green);
            font-size: 2em;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px var(--neon-glow);
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 red;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 blue;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(20px, 9999px, 80px, 0); }
            20% { clip: rect(60px, 9999px, 10px, 0); }
            40% { clip: rect(30px, 9999px, 50px, 0); }
            60% { clip: rect(90px, 9999px, 20px, 0); }
            80% { clip: rect(10px, 9999px, 70px, 0); }
            100% { clip: rect(50px, 9999px, 30px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(10px, 9999px, 90px, 0); }
            20% { clip: rect(80px, 9999px, 20px, 0); }
            40% { clip: rect(40px, 9999px, 60px, 0); }
            60% { clip: rect(20px, 9999px, 80px, 0); }
            80% { clip: rect(70px, 9999px, 10px, 0); }
            100% { clip: rect(30px, 9999px, 50px, 0); }
        }

        /* INPUTS & BUTTONS */
        input, textarea, button {
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px;
            width: 95%;
            font-family: inherit;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            box-shadow: 0 0 15px var(--neon-green);
            outline: none;
        }
        button {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }
        button:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 25px var(--neon-green);
        }

        /* LINKS */
        .nav a {
            color: var(--neon-green);
            margin-right: 20px;
            text-decoration: none;
            border: 1px solid transparent;
            padding: 5px 10px;
        }
        .nav a:hover {
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            background: rgba(0, 255, 0, 0.1);
        }

        /* CRT SCANLINE OVERLAY */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .error { color: var(--alert); border: 1px solid var(--alert); padding: 10px; background: rgba(50,0,0,0.3); }

    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="scanlines"></div>

    <div class="container">
        <header>
            <h1 class="glitch" data-text=">> UNIVERSITY_PORTAL [SECURE]">>> UNIVERSITY_PORTAL [SECURE]</h1>
        </header>
        
        {% if session.user_id %}
        <nav class="nav">
            <a href="{{ url_for('dashboard') }}">[ DASHBOARD ]</a>
            <a href="{{ url_for('profile', id=session.user_id) }}">[ PROFILE ]</a>
            <a href="{{ url_for('feedback') }}">[ FEEDBACK ]</a>
            <a href="{{ url_for('login') }}">[ LOGOUT ]</a>
        </nav>
        {% endif %}

        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer style="margin-top: 50px; font-size: 0.8em; opacity: 0.7; border-top: 1px dashed var(--neon-green); padding-top: 10px;">
            <p id="typewriter">SYSTEM STATUS: ONLINE // ENCRYPTION: 4096-BIT //</p>
        </footer>
    </div>

    <script>
        // MATRIX RAIN SCRIPT
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロヲゴゾドボポ1234567890';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width/fontSize;
        const rainDrops = [];

        for( let x = 0; x < columns; x++ ) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++)
            {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };
        setInterval(draw, 30);

        // Window Resize Handling
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
