<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNICORP | CyberSynergy</title>
    <style>
        /* Make sure the body has no margins so the canvas fits perfectly */
        body { margin: 0; padding: 0; color: #444; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; }
        
        /* The Matrix Canvas is fixed to the background */
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; width: 100vw; height: 100vh; }
        
        /* We added a slight transparency to the terminal background (rgba) so it blends better */
        .terminal { border: 1px solid #0f0; padding: 40px; background: rgba(5, 5, 8, 0.85); width: 100%; max-width: 600px; text-align: center; box-shadow: 0 0 50px rgba(0, 255, 0, 0.2); backdrop-filter: blur(5px); z-index: 1; }
        
        h1 { color: #888; letter-spacing: 2px; font-size: 1.2rem; border-bottom: 1px solid #222; padding-bottom: 10px;}
        input, button { width: 100%; padding: 10px; margin-top: 15px; background: #000; border: 1px solid #333; color: #0f0; font-family: monospace; box-sizing: border-box; }
        button { cursor: pointer; color: #888; transition: 0.3s; }
        button:hover { background: #111; color: #0f0; border-color: #0f0; box-shadow: 0 0 10px #0f0; }
        .log { margin-top: 20px; font-size: 0.8rem; color: #f00; text-align: left; min-height: 20px; }
        .nav-links { margin-top: 30px; font-size: 0.7rem; display: flex; justify-content: space-between; border-top: 1px dashed #222; padding-top: 10px;}
        .nav-links a { color: #555; text-decoration: none; }
        .nav-links a:hover { color: #0f0; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="terminal">
        {% block content %}{% endblock %}
        
        <div class="nav-links">
            <a href="/">[ HOME ]</a>
            <a href="/profile">[ SYSTEM PROFILE ]</a>
            <a href="/feedback">[ SUBMIT DIAGNOSTICS ]</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        
        // Array to store the Y coordinate of each drop
        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function draw() {
            // Black background with extreme opacity to create the fading trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Classic Hacker Green
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                
                // Print the character
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Send the drop back to the top randomly to create the staggered rain
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                // Move the drop down
                drops[i]++;
            }
        }

        // Run the animation every 33 milliseconds
        setInterval(draw, 33);

        // Ensure the canvas resizes if the user resizes their browser window
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
