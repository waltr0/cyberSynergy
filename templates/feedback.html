{% extends "base.html" %}
{% block content %}
    <h2>// SYSTEM_FEEDBACK_LOOP</h2>
    <p>Report bugs to the administrator. (HTML is permitted for log formatting).</p>
    
    {% if error %} <div class="error">{{ error }}</div> {% endif %}
    
    <form method="POST">
        <textarea name="message" rows="4" placeholder="Enter your report..."></textarea>
        <button type="submit">>> TRANSMIT_DATA</button>
    </form>
    
    <h3 style="margin-top: 30px;">>> RECENT_LOGS</h3>
    <div id="logs" style="background: #050505; padding: 10px; border: 1px solid #333; height: 200px; overflow-y: auto;">
        {% for msg in messages %}
            <div style="border-bottom: 1px dashed #333; padding: 5px 0; margin-bottom: 5px;">
                > {{ msg['message'] | safe }}
            </div>
        {% endfor %}
    </div>
{% endblock %}
