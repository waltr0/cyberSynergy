{% extends "base.html" %}
{% block content %}
    <h2>// USER_PROFILE_DATA</h2>
    
    {% if user %}
        <div style="background: rgba(0, 50, 0, 0.4); padding: 20px; border-left: 5px solid var(--neon-green);">
            <p>>> <strong>USERNAME:</strong> {{ user['username'] }}</p>
            <p>>> <strong>ROLE:</strong> {{ user['role'] }}</p>
            <p>>> <strong>BIO:</strong> {{ user['bio'] }}</p>
        </div>
    {% else %}
        <div class="error">>> ERROR: USER_RECORD_NOT_FOUND</div>
    {% endif %}
{% endblock %}
